spring.application.name=api-gateway

server.port=${PORT:8080}

eureka.client.enabled=false

internal.gateway.secret=${INTERNAL_SECRET}

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.discovery.locator.enabled=false

# AUTH SERVICE
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=https://angelic-achievement-production-eae6.up.railway.app
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# TICKETS
spring.cloud.gateway.server.webmvc.routes[1].id=ticket-service-tickets
spring.cloud.gateway.server.webmvc.routes[1].uri=https://authentic-youth-production-5be7.up.railway.app
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/tickets/**

# DASHBOARD
spring.cloud.gateway.server.webmvc.routes[2].id=ticket-service-dashboard
spring.cloud.gateway.server.webmvc.routes[2].uri=https://authentic-youth-production-5be7.up.railway.app
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/dashboard/**

# COMMENTS
