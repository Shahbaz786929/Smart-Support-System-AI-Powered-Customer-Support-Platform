spring.cloud.gateway.server.webmvc.routes[5].id=ticket-service-uploads
spring.cloud.gateway.server.webmvc.routes[5].uri=https://authentic-youth-production-5be7.up.railway.app
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/uploads/**