spring.application.name=api-gateway

server.port=${PORT:8080}

eureka.client.service-url.defaultZone=https://smart-support-system-ai-powered-customer-support-production.up.railway.app/eureka

eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# AUTH SERVICE ROUTE
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# TICKET SERVICE ROUTE
spring.cloud.gateway.server.webmvc.routes[1].id=ticket-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://TICKET-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/tickets/**