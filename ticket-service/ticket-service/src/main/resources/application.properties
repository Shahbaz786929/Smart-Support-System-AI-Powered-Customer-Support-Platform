spring.application.name=ticket-service

server.port=${PORT:8082}

#eureka.client.service-url.defaultZone=https://smart-support-system-ai-powered-customer-support-production.up.railway.app/eureka
#eureka.instance.prefer-ip-address=true
eureka.client.enabled=false

auth.service.url=https://authentic-youth-production-5be7.up.railway.app

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Gemini
spring.ai.google.api-key=${GEMINI_API_KEY}
gemini.api.key=${GEMINI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.google.chat.options.model=gemini-2.5-flash


#mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SSL Fix
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# upload file
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB